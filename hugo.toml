baseURL = 'https://shelterwood.ai/'
languageCode = 'en-ca'
title = 'Shelterwood AI'
theme = 'PaperMod'
copyright = "© 2026 Shelterwood AI Inc. · [peter.cresswell@shelterwood.ai](mailto:peter.cresswell@shelterwood.ai)"

[params]
  description = "Shelterwood AI Inc. is an AI-native software company in Toronto, Canada, building and running a portfolio of small software businesses. Flagship: Cuesheet."
  env = "production"
  defaultTheme = "light"
  showReadingTime = false
  showShareButtons = false
  showPostNavLinks = false
  showBreadCrumbs = false
  showCodeCopyButtons = false
  showFullTextinRSS = true
  hideFooter = false
  mainSections = ["none"]

  [params.label]
    text = "shelterwood"
    icon = "/brand/logo-mark.svg"
    iconHeight = 36

  [params.assets]
    favicon = "/favicon.svg"
    favicon16x16 = "/favicon-16.png"
    favicon32x32 = "/favicon-32.png"
    apple_touch_icon = "/apple-touch-icon.png"

  [params.cover]
    hiddenInList = true
    hiddenInSingle = true

  [params.footer]
    hideCopyright = false
    text = "[Privacy](/privacy/) · [Cuesheet privacy](/portfolio/cuesheet/privacy/)"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 10
  [[menu.main]]
    identifier = "portfolio"
    name = "Portfolio"
    url = "/portfolio/"
    weight = 20
  [[menu.main]]
    identifier = "approach"
    name = "Approach"
    url = "/approach/"
    weight = 30
  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 40
